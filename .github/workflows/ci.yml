name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: transport
          POSTGRES_PASSWORD: transport
          POSTGRES_DB: transport_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U transport -d transport_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://transport:transport@127.0.0.1:5432/transport_test?schema=public
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - run: npm run prisma:migrate --workspace backend
